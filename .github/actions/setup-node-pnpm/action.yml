name: '🚀 Setup Node + PNPM'
description: 'Atomic setup for all workflows'
inputs:
  node-version:
    description: 'Node.js version'
    required: true
  enable-wasm:
    description: 'Enable WASM repair mode'
    required: false
    default: 'false'
runs:
  using: 'composite'
  steps:
    - name: 📦 Install pnpm
      uses: pnpm/action-setup@v4
      with:
        version: 9
    - name: 🔧 Setup Node.js ${{ inputs.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}
        cache: 'pnpm'
    - name: 🧹 Clean entropy (if enabled)
      if: inputs.enable-wasm == 'true'
      shell: bash
      run: |
        rm -rf node_modules pnpm-lock.yaml
        echo "✅ Entropy cleaned"
    - name: 🔒 Frozen install
      shell: bash
      run: pnpm install --frozen-lockfile
    - name: 🛡️ WASM validation
      if: inputs.enable-wasm == 'true'
      shell: bash
      run: |
        pnpm exec tsc --noEmit --strict
        echo "✅ WASM + TypeScript enforced"