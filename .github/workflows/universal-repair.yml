name: "🌐 Universal Auto-Repair"

on:
  workflow_dispatch:
  pull_request:
    branches: [main, master]

permissions:
  contents: write
  pull-requests: write

jobs:
  repair:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ github.head_ref }}
      - uses: actions/setup-node@v4
        with:
          node-version: '22.x'
      - name: Auto-Repair
        run: |
          git config user.name "Atomic Swarm Gods"
          npm install
          npm run build
          git add .
          git diff --staged --quiet || git commit -m "🌐 Auto-repair"
          git push origin HEAD:${{ github.head_ref }}
