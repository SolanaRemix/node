name: "⚡ Atomic Gods — Universal Auto-Repair"
 
on:
  workflow_dispatch:
    inputs:
      repair_depth:
        description: 'Repair depth'
        required: false
        default: 'auto'
        type: choice
        options: [auto, quick, deep, full-rebuild]
  push:
    branches: [main, master, dev, develop]
  pull_request:
    branches: [main, master]
  schedule:
    - cron: '0 */4 * * *'
  issue_comment:
    types: [created]
 
permissions:
  contents: write
  pull-requests: write
  issues: write
 
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
 
# ─────────────────────────────────────────────────────────────────────────────
# Job 1 (issue_comment only): resolve the actual PR branch before anything else.
# github.head_ref is NULL on issue_comment events — must be fetched via API.
# ─────────────────────────────────────────────────────────────────────────────
jobs:
  resolve-context:
    runs-on: ubuntu-latest
    outputs:
      target_ref:    ${{ steps.ctx.outputs.target_ref }}
      is_pr_comment: ${{ steps.ctx.outputs.is_pr_comment }}
      pr_number:     ${{ steps.ctx.outputs.pr_number }}
    steps:
      - name: "Resolve target branch"
        id: ctx
        uses: actions/github-script@v7
        with:
          script: |
            // For issue_comment we must look up the PR; other events use the ref directly.
            if (context.eventName === 'issue_comment') {
              try {
                const { data: pr } = await github.rest.pulls.get({
                  owner: context.repo.owner,
                  repo:  context.repo.repo,
                  pull_number: context.issue.number,
                });
                core.setOutput('target_ref',    pr.head.ref);
                core.setOutput('is_pr_comment', 'true');
                core.setOutput('pr_number',     String(context.issue.number));
              } catch (e) {
                core.setFailed(`Not a PR comment or PR not found: ${e.message}`);
              }
            } else {
              // push / PR / schedule / workflow_dispatch — ref is known
              const ref = context.payload.pull_request?.head?.ref
                       || context.ref.replace('refs/heads/', '');
              core.setOutput('target_ref',    ref);
              core.setOutput('is_pr_comment', 'false');
              core.setOutput('pr_number',     '');
            }
 
  # ───────────────────────────────────────────────────────────────────────────
  # Job 2: detect, repair, commit, report.
  # ───────────────────────────────────────────────────────────────────────────
  auto-detect-and-repair:
    needs: resolve-context
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      TARGET_REF: ${{ needs.resolve-context.outputs.target_ref }}
      PR_NUMBER:  ${{ needs.resolve-context.outputs.pr_number }}
 
    steps:
      # ── Checkout the CORRECT branch ────────────────────────────────────────
      - name: "Checkout"
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref:   ${{ needs.resolve-context.outputs.target_ref }}   # ← FIXED
          fetch-depth: 0
 
      - name: "Git identity"
        run: |
          git config user.name  "Atomic Gods AI Agent"
          git config user.email "ai-agent@atomic-gods.dev"
 
      # ── Auto-detect project shape ──────────────────────────────────────────
      - name: "Detect project"
        id: detect
        run: |
          # Package manager
          if   [ -f "pnpm-lock.yaml" ]; then PKG=pnpm;  INSTALL="pnpm install --no-frozen-lockfile"
          elif [ -f "yarn.lock"       ]; then PKG=yarn;  INSTALL="yarn install --no-immutable"
          elif [ -f "package-lock.json" ]; then PKG=npm; INSTALL="npm ci || npm install"
          else                               PKG=npm;  INSTALL="npm install"; fi
          echo "pkg=$PKG"       >> $GITHUB_OUTPUT
          echo "install=$INSTALL" >> $GITHUB_OUTPUT
 
          # Framework
          if   [ -f "next.config.js" ] || [ -f "next.config.ts" ]; then FW=nextjs
          elif [ -f "vite.config.ts" ] || [ -f "vite.config.js"  ]; then FW=vite
          elif [ -f "tsconfig.json" ]; then FW=typescript
          else FW=node; fi
          echo "framework=$FW" >> $GITHUB_OUTPUT
 
          # TypeScript present?
          TS=$(find . -name "*.ts" -not -path "*/node_modules/*" 2>/dev/null | head -1)
          echo "has_ts=$([ -n "$TS" ] && echo true || echo false)" >> $GITHUB_OUTPUT
 
          echo "Detected: pkg=$PKG fw=$FW has_ts=$([ -n "$TS" ] && echo true || echo false)"
 
      # ── Setup toolchain ────────────────────────────────────────────────────
      - name: "Setup Node 22"
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
 
      - name: "Setup package manager"
        run: |
          PKG="${{ steps.detect.outputs.pkg }}"
          [ "$PKG" = "pnpm" ] && npm install -g pnpm@latest || true
          [ "$PKG" = "yarn" ] && npm install -g yarn@latest  || true
 
      # ── Deep clean (only on deep/full-rebuild) ─────────────────────────────
      - name: "Entropy cleanup"
        if: |
          contains(github.event.inputs.repair_depth, 'deep') ||
          contains(github.event.inputs.repair_depth, 'full-rebuild')
        run: |
          rm -rf node_modules .next dist build .cache .pnpm-store
          rm -f  pnpm-lock.yaml yarn.lock package-lock.json
 
      # ════════════════════════════════════════════════════════════════════════
      # THE REAL FIX ENGINE — creates missing files, patches existing ones
      # ════════════════════════════════════════════════════════════════════════
      - name: "Create / patch missing files"
        id: repair
        run: |
          set -euo pipefail
          FIXES=()
          HAS_TS="${{ steps.detect.outputs.has_ts }}"
 
          # ── 1. package.json ────────────────────────────────────────────────
          if [ ! -f "package.json" ]; then
            cat > package.json <<PKGJSON
          {
            "name": "$(basename $GITHUB_REPOSITORY)",
            "version": "0.1.0",
            "private": true,
            "scripts": {},
            "devDependencies": {}
          }
          PKGJSON
            FIXES+=("Created package.json")
          fi
 
          # ── 2. Inject missing scripts (pure node — no npx json needed) ────
          node - <<'NODESCRIPT'
          const fs = require('fs');
          const p  = JSON.parse(fs.readFileSync('package.json','utf8'));
          p.scripts = p.scripts || {};
          const hasTS = process.env.HAS_TS === 'true';
          const defaults = hasTS
            ? { build:'tsc', dev:'ts-node src/index.ts', start:'node dist/index.js',
                test:'jest', lint:'eslint . --ext .ts,.tsx', format:'prettier --write .' }
            : { build:'echo "no build"', start:'node src/index.js',
                test:'jest', lint:'eslint .', format:'prettier --write .' };
          let changed = false;
          for (const [k,v] of Object.entries(defaults)) {
            if (!p.scripts[k]) { p.scripts[k]=v; changed=true; }
          }
          if (changed) {
            fs.writeFileSync('package.json', JSON.stringify(p,null,2)+'\n');
            console.log('Patched package.json scripts');
          }
          NODESCRIPT
          [ "$(git diff --name-only package.json 2>/dev/null)" ] && FIXES+=("Patched package.json scripts") || true
 
          # ── 3. tsconfig.json ───────────────────────────────────────────────
          if [ "$HAS_TS" = "true" ] && [ ! -f "tsconfig.json" ]; then
            cat > tsconfig.json <<'TSCONFIG'
          {
            "compilerOptions": {
              "target": "ES2020",
              "module": "CommonJS",
              "moduleResolution": "node",
              "lib": ["ES2022", "DOM"],
              "types": ["node"],
              "outDir": "./dist",
              "rootDir": "./src",
              "strict": true,
              "esModuleInterop": true,
              "skipLibCheck": true,
              "forceConsistentCasingInFileNames": true,
              "resolveJsonModule": true,
              "declaration": true,
              "sourceMap": true
            },
            "include": ["src/**/*"],
            "exclude": ["node_modules", "dist", "**/*.test.ts"]
          }
          TSCONFIG
            FIXES+=("Created tsconfig.json")
          elif [ "$HAS_TS" = "true" ] && [ -f "tsconfig.json" ]; then
            # Patch common bad values in-place using node (no PowerShell regex)
            node - <<'NODESCRIPT'
          const fs = require('fs');
          const t  = JSON.parse(fs.readFileSync('tsconfig.json','utf8'));
          const co = t.compilerOptions = t.compilerOptions || {};
          const patches = {
            lib:['ES2022','DOM'], types:['node'],
            module:'CommonJS', moduleResolution:'node',
            skipLibCheck:true, esModuleInterop:true
          };
          let changed = false;
          for (const [k,v] of Object.entries(patches)) {
            if (JSON.stringify(co[k]) !== JSON.stringify(v)) { co[k]=v; changed=true; }
          }
          if (changed) {
            fs.writeFileSync('tsconfig.json', JSON.stringify(t,null,2)+'\n');
            console.log('Patched tsconfig.json');
          }
          NODESCRIPT
            [ "$(git diff --name-only tsconfig.json 2>/dev/null)" ] && FIXES+=("Patched tsconfig.json") || true
          fi
 
          # ── 4. .gitignore ──────────────────────────────────────────────────
          if [ ! -f ".gitignore" ]; then
            printf 'node_modules/\ndist/\n.env\n.env.local\n*.log\ncoverage/\n.DS_Store\n' > .gitignore
            FIXES+=("Created .gitignore")
          elif ! grep -q "node_modules" .gitignore; then
            echo -e "\nnode_modules/" >> .gitignore
            FIXES+=("Added node_modules to .gitignore")
          fi
 
          # ── 5. Remove stale console redeclarations (old autofix damage) ───
          if [ "$HAS_TS" = "true" ]; then
            find src -name "*.ts" 2>/dev/null | while read f; do
              if grep -q 'declare const console: Console' "$f" 2>/dev/null; then
                sed -i '/\/\/\/ <reference types="node" \/>/d' "$f"
                sed -i '/declare const console: Console;/d' "$f"
                sed -i '/^$/N;/^\n$/d' "$f"
              fi
            done
            FIXES+=("Cleaned stale console declarations")
          fi
 
          # ── 6. Install ─────────────────────────────────────────────────────
          eval "${{ steps.detect.outputs.install }}" 2>&1 | tail -5 || true
          FIXES+=("Ran ${{ steps.detect.outputs.pkg }} install")
 
          # ── 7. Install missing TS devDeps ──────────────────────────────────
          if [ "$HAS_TS" = "true" ]; then
            node - <<'NODESCRIPT'
          const p = JSON.parse(require('fs').readFileSync('package.json','utf8'));
          const dd = {...(p.devDependencies||{}), ...(p.dependencies||{})};
          const missing = ['typescript','@types/node','ts-node'].filter(d=>!dd[d]);
          if (missing.length) {
            const {execSync}=require('child_process');
            execSync('npm install --save-dev '+missing.join(' '), {stdio:'inherit'});
            console.log('Installed: '+missing.join(', '));
          }
          NODESCRIPT
          fi
 
          # ── 8. Prettier ────────────────────────────────────────────────────
          npx --yes prettier --write . --ignore-unknown 2>/dev/null && FIXES+=("Applied Prettier") || true
 
          # ── 9. ESLint fix ──────────────────────────────────────────────────
          EXT=$([ "$HAS_TS" = "true" ] && echo ".ts,.tsx,.js,.jsx" || echo ".js,.jsx")
          npx eslint --fix --ext "$EXT" . 2>/dev/null && FIXES+=("Ran ESLint --fix") || true
 
          # ── 10. Build ──────────────────────────────────────────────────────
          if node -e "const p=require('./package.json'); process.exit(p.scripts?.build?0:1)" 2>/dev/null; then
            npm run build 2>&1 | tail -5 && FIXES+=("Build succeeded") || true
          fi
 
          # ── 11. Save fix list & commit ─────────────────────────────────────
          printf '%s\n' "${FIXES[@]}" > /tmp/fixes.txt
          git add -A
          if git diff --cached --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            CHANGED=$(git diff --cached --name-only | head -20)
            git commit -m "⚡ Auto-repair: created missing configs + applied fixes
 
          Files changed:
          $(git diff --cached --name-only)
 
          Triggered by: ${{ github.event_name }} on ${{ github.ref_name }}"
            git push origin HEAD:"$TARGET_REF"
            echo "changed=true"           >> $GITHUB_OUTPUT
            echo "changed_files<<EOF"     >> $GITHUB_OUTPUT
            echo "$CHANGED"               >> $GITHUB_OUTPUT
            echo "EOF"                    >> $GITHUB_OUTPUT
          fi
 
      # ── Security audit (non-blocking) ──────────────────────────────────────
      - name: "Security audit"
        run: npm audit --audit-level=moderate 2>/dev/null || true
 
      # ── Step summary ────────────────────────────────────────────────────────
      - name: "Write job summary"
        if: always()
        run: |
          FIXES=$(cat /tmp/fixes.txt 2>/dev/null || echo "None")
          cat >> $GITHUB_STEP_SUMMARY <<SUMMARY
          ## ⚡ Atomic Gods — Auto-Repair Report
 
          | Field | Value |
          |-------|-------|
          | Repository | ${{ github.repository }} |
          | Branch | $TARGET_REF |
          | Package manager | ${{ steps.detect.outputs.pkg }} |
          | Framework | ${{ steps.detect.outputs.framework }} |
          | Files changed | ${{ steps.repair.outputs.changed }} |
 
          **Fixes applied:**
          \`\`\`
          $FIXES
          \`\`\`
          SUMMARY
 
      # ── Comment on PR if triggered by issue_comment ─────────────────────────
      - name: "Post PR comment"
        if: needs.resolve-context.outputs.is_pr_comment == 'true'
        uses: actions/github-script@v7
        env:
          CHANGED:       ${{ steps.repair.outputs.changed }}
          CHANGED_FILES: ${{ steps.repair.outputs.changed_files }}
        with:
          script: |
            const changed = process.env.CHANGED === 'true';
            const files   = process.env.CHANGED_FILES || '';
            const fixes   = require('fs').readFileSync('/tmp/fixes.txt','utf8').trim();
            const branch  = process.env.TARGET_REF;
 
            let body = `## ⚡ Atomic Gods — Universal Auto-Repair\n\n`;
            body += `**Branch:** \`${branch}\`\n\n`;
            if (changed) {
              body += `### ✅ Fixes committed & pushed\n\n`;
              if (fixes) { fixes.split('\n').filter(Boolean).forEach(f => body += `- ${f}\n`); }
              if (files) body += `\n**Files changed:**\n\`\`\`\n${files}\n\`\`\`\n`;
            } else {
              body += `### ✅ Repository already healthy — no changes needed\n`;
            }
            body += `\n---\n*⚡ Atomic Gods AI Agent · ${new Date().toUTCString()}*`;
 
            await github.rest.issues.createComment({
              issue_number: parseInt(process.env.PR_NUMBER),
              owner: context.repo.owner,
              repo:  context.repo.repo,
              body,
            });
