name: "⚡ Universal Auto-Repair"

on:
  pull_request:
    types: [opened, synchronize]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  repair:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@v4
        with:
          node-version: '22.x'
      - name: "Auto-Repair"
        run: |
          git config user.name "Atomic Gods AI Agent"
          npm install || true
          npm run build || true
          git add .
          git diff --staged --quiet || git commit -m "⚡ Auto-repair: Fixed issues"
          git push || true
