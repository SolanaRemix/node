name: '🚀 Setup Monorepo'
description: 'Atomic setup for NestJS + Next.js + Mobile'
inputs:
  workspace:
    description: 'Workspace to install (backend, app-nextjs, mobile)'
    required: true
  node-version:
    description: 'Node version'
    required: false
    default: '24.x'
runs:
  using: 'composite'
  steps:
    - name: 📦 Install pnpm
      uses: pnpm/action-setup@v4
      with:
        version: 9
    - name: 🔧 Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}
        cache: 'pnpm'
    - name: 📥 Install dependencies
      shell: bash
      run: |
        cd ${{ inputs.workspace }}
        pnpm install --frozen-lockfile