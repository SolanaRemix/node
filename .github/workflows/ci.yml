name: 🚀 Atomic CI

on:
  push:
    branches: [ "main", "dev" ]
  pull_request:
    branches: [ "main", "dev" ]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [20.x, 22.x, 24.x]   # full dynamic coverage
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 📦 Setup PNPM
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: 🟢 Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - name: 📥 Install
        run: pnpm install --no-frozen-lockfile

      - name: 🔍 Lint
        run: pnpm run lint --if-present

      - name: 🔎 Typecheck
        run: pnpm run typecheck --if-present

      - name: 🏗 Build
        run: pnpm run build --if-present

      - name: ✅ Test
        run: pnpm run test --if-present

      - name: 🔐 Audit
        run: pnpm audit --prod || true

      - name: 📤 Upload Logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: logs-node-${{ matrix.node }}
          path: ./