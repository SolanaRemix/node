name: 🚀 Atomic CI

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
      - dev
  workflow_dispatch:
  schedule:
    - cron: "0 2 * * *"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  atomic:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [20.x, 22.x]

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 📦 Setup PNPM
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: 🟢 Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - name: 📥 Install
        run: pnpm install --frozen-lockfile

      - name: 🔍 Lint
        run: pnpm run lint --if-present

      - name: 🔎 Typecheck
        run: pnpm run typecheck --if-present

      - name: 🏗 Build
        run: pnpm run build --if-present

      - name: ✅ Test
        run: pnpm run test --if-present

      - name: 🔐 Audit
        run: pnpm audit --prod || true

      - name: 📖 Generate Docs
        run: pnpm run docs:generate --if-present

      - name: 📝 Changelog
        run: pnpm run changelog --if-present

      - name: 📤 Upload Logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: atomic-logs-node-${{ matrix.node }}
          path: ./
