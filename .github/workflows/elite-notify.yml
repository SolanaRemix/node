name: "📢 Elite Notifications"

on:
  workflow_run:
    workflows: ["🚀 Atomic Node Repair (Prod)", "🤖 Elite AI Agent", "🌐 Agentic Swarm WASM Repair (Dev) - Elite Edition"]
    types: [completed]
  workflow_dispatch:

# Add permissions at the root level
permissions:
  contents: read
  issues: write
  pull-requests: write
  actions: read

# Force bash shell
defaults:
  run:
    shell: bash

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  notify:
    runs-on: ubuntu-latest
    # Add permissions at job level too
    permissions:
      contents: read
      issues: write
      pull-requests: write
      actions: read
    
    steps:
      - name: 📊 Generate Enterprise Report
        run: |
          echo "## 📢 Elite Notification" >> notification.md
          echo "- **Status:** ${{ github.event.workflow_run.conclusion }}" >> notification.md
          echo "- **Repository:** ${{ github.repository }}" >> notification.md
          echo "- **Time:** $(date)" >> notification.md
          cat notification.md >> $GITHUB_STEP_SUMMARY
          
      - name: 💬 Create Issue on Failure
        if: github.event.workflow_run.conclusion == 'failure'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { repo, owner } = context.repo;
            const workflowName = '${{ github.event.workflow_run.name }}';
            
            try {
              const issue = await github.rest.issues.create({
                owner,
                repo,
                title: `📢 Elite Alert: ${workflowName} failed`,
                body: `## 🔴 Workflow Failure Alert\n\n**Workflow:** ${workflowName}\n**Status:** ${{ github.event.workflow_run.conclusion }}\n**Time:** ${new Date().toUTCString()}\n\n[View Run](${{ github.event.workflow_run.html_url }})`
              });
              console.log(`✅ Issue #${issue.data.number} created`);
            } catch (error) {
              console.log(`⚠️ Could not create issue: ${error.message}`);
            }
