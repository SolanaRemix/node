name: 🌐 Agentic Swarm WASM Repair

on:
  pull_request:
    branches:
      - dev
      - main

  workflow_dispatch:

jobs:
  swarm:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        node: [20.x, 22.x]

    steps:
      - uses: actions/checkout@v4

      - name: 📦 Setup PNPM
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - name: 📥 Install
        run: pnpm install --no-frozen-lockfile

      - name: 🔎 Typecheck
        run: pnpm run typecheck --if-present

      - name: 📦 Build
        run: pnpm run build --if-present

      - name: ✅ Test
        run: pnpm run test --if-present

      - name: 🦀 WASM Validation
        run: |
          echo "=== WASM Validation ==="

          if [ -f tsconfig.json ]; then
            npx tsc --noEmit
          fi