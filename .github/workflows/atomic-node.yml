name: 🌐 Agentic Swarm WASM Repair

on:
  pull_request:
    branches: [ "dev", "feature/**" ]
  issue_comment:
    types: [created]
  workflow_dispatch:

jobs:
  swarm:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [18.x, 20.x, 22.x, 24.x]

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: "pnpm"

      - name: 🧹 Clean entropy
        run: rm -rf node_modules && rm -f package-lock.json pnpm-lock.yaml yarn.lock

      - name: 🔒 Frozen install
        run: pnpm install --frozen-lockfile

      - name: 📦 Build
        run: pnpm run build --if-present

      - name: ✅ Test
        run: pnpm run test --if-present

      - name: 🔧 WASM repair
        run: |
          echo "=== WASM Repair ==="
          if [ -f tsconfig.json ]; then
            sed -i 's/"strict": false/"strict": true/' tsconfig.json
          fi
