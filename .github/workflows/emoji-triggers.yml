name: "🎯 Elite Emoji Triggers"

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  resolve-pr:
    if: contains(github.event.comment.body, '@repair') || contains(github.event.comment.body, '@clean') || contains(github.event.comment.body, '@lock')
    runs-on: ubuntu-latest
    outputs:
      pr_head_ref: ${{ steps.pr.outputs.head_ref }}
      pr_head_sha: ${{ steps.pr.outputs.head_sha }}
      pr_number:   ${{ steps.pr.outputs.number }}
      command:     ${{ steps.cmd.outputs.command }}
    steps:
      - name: "🔍 Resolve PR branch"
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            const issue_number = context.issue.number;
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: issue_number,
            });
            core.setOutput('head_ref', pr.head.ref);
            core.setOutput('head_sha', pr.head.sha);
            core.setOutput('number', issue_number);

      - name: "🏷️ Parse command"
        id: cmd
        run: |
          BODY="${{ github.event.comment.body }}"
          if [[ "$BODY" == *"@repair"* ]]; then echo "command=repair" >> $GITHUB_OUTPUT
          elif [[ "$BODY" == *"@clean"* ]]; then echo "command=clean" >> $GITHUB_OUTPUT
          elif [[ "$BODY" == *"@lock"* ]]; then echo "command=lock" >> $GITHUB_OUTPUT
          fi

  run-command:
    needs: resolve-pr
    if: needs.resolve-pr.outputs.pr_head_ref != ''
    runs-on: ubuntu-latest
    env:
      PR_BRANCH: ${{ needs.resolve-pr.outputs.pr_head_ref }}
      PR_NUMBER: ${{ needs.resolve-pr.outputs.pr_number }}
      COMMAND:   ${{ needs.resolve-pr.outputs.command }}
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ needs.resolve-pr.outputs.pr_head_ref }}
          fetch-depth: 0

      - name: "🔧 Setup"
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'

      - name: "🚀 Execute @repair"
        if: env.COMMAND == 'repair'
        run: |
          # Create missing files
          if [ ! -f "package.json" ]; then
            cat > package.json <<'EOF'
          {"name": "repaired-repo", "version": "1.0.0", "scripts": {"build": "tsc"}, "devDependencies": {"typescript": "^5.0.0", "@types/node": "^20.0.0"}}
          EOF
          fi

          if [ ! -f "tsconfig.json" ]; then
            cat > tsconfig.json <<'EOF'
          {"compilerOptions": {"target": "ES2022", "module": "commonjs", "lib": ["ES2022", "DOM"], "types": ["node"], "strict": true, "outDir": "./dist", "rootDir": "./src", "esModuleInterop": true, "skipLibCheck": true}}
          EOF
          fi

          npm install
          npx tsc --noEmit || true
          npm run build || true

          git add .
          git diff --cached --quiet || {
            git config user.name "Atomic Gods AI Agent"
            git config user.email "ai-agent@atomic-gods.dev"
            git commit -m "🤖 Auto-repair: Fixed configs and types"
            git push origin HEAD:$PR_BRANCH
          }

      - name: "💬 Post comment"
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: parseInt(process.env.PR_NUMBER),
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '✅ **Atomic Gods Auto-Repair Complete**\n\nFixes applied via @repair command.'
            })
