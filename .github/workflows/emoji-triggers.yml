name: "🎯 Elite Emoji Triggers"

on:
  issue_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write

jobs:
  resolve-pr:
    if: contains(github.event.comment.body, '@repair')
    runs-on: ubuntu-latest
    outputs:
      pr_branch: ${{ steps.pr.outputs.head_ref }}
      pr_number: ${{ steps.pr.outputs.number }}
    steps:
      - name: "Get PR info"
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number
            });
            core.setOutput('head_ref', pr.head.ref);
            core.setOutput('number', pr.number);
            console.log(`PR #${pr.number} branch: ${pr.head.ref}`);

  repair:
    needs: resolve-pr
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve-pr.outputs.pr_branch }}
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@v4
        with:
          node-version: '22.x'
      - name: "Auto-Repair"
        run: |
          git config user.name "Atomic Gods AI Agent"
          git config user.email "ai-agent@atomic-gods.dev"
          npm install || true
          npm run build || true
          git add .
          git diff --staged --quiet || git commit -m "🤖 @repair: Auto-fix applied"
          git push origin HEAD:${{ needs.resolve-pr.outputs.pr_branch }} || true
      - name: "Post Comment"
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: ${{ needs.resolve-pr.outputs.pr_number }},
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '✅ **Atomic Gods Auto-Repair Complete**\n\nFixes have been applied to this PR.\n\n🤖 *This auto-repair was performed by the Atomic Gods AI Agent*'
            })
