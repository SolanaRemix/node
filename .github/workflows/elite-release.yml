name: 🚀 Elite Auto-Release Pipeline

on:
  push:
    branches: [main]

# 🔴 CRITICAL: Write permissions for releases
permissions:
  contents: write
  packages: write
  id-token: write
  pull-requests: read

jobs:
  analyze-commits:
    name: 📊 Analyze Commit Messages
    runs-on: ubuntu-latest
    outputs:
      release-type: ${{ steps.semantic.outputs.release-type }}
      new-version: ${{ steps.version.outputs.new-version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
      
      - name: Analyze commit messages
        id: semantic
        run: |
          # Get commits since last tag
          last_tag=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          commits=$(git log $last_tag..HEAD --format=%s)
          
          # Check for breaking changes
          if echo "$commits" | grep -qE '^feat!:|^fix!:|.*BREAKING CHANGE:'; then
            echo "release-type=major" >> $GITHUB_OUTPUT
          elif echo "$commits" | grep -q '^feat:'; then
            echo "release-type=minor" >> $GITHUB_OUTPUT
          elif echo "$commits" | grep -q '^fix:'; then
            echo "release-type=patch" >> $GITHUB_OUTPUT
          else
            echo "release-type=none" >> $GITHUB_OUTPUT
          fi
      
      - name: Calculate new version
        id: version
        run: |
          current_version=$(git describe --tags --abbrev=0 2>/dev/null || echo "v1.0.0")
          current_version=${current_version#v}
          major=$(echo $current_version | cut -d. -f1)
          minor=$(echo $current_version | cut -d. -f2)
          patch=$(echo $current_version | cut -d. -f3)
          
          case "${{ steps.semantic.outputs.release-type }}" in
            major)
              new_version="v$((major+1)).0.0"
              ;;
            minor)
              new_version="v$major.$((minor+1)).0"
              ;;
            patch)
              new_version="v$major.$minor.$((patch+1))"
              ;;
            *)
              new_version=""
              ;;
          esac
          echo "new-version=$new_version" >> $GITHUB_OUTPUT

  create-release:
    name: 📦 Create GitHub Release
    needs: analyze-commits
    if: needs.analyze-commits.outputs.release-type != 'none'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Setup Node.js
        uses: actions/setup-node@1d0ff469b7ec7b3cb9d8673fde0c81c44821de2a # v4.2.0
        with:
          node-version: '22'
      
      - name: Update package.json version
        run: |
          new_version="${{ needs.analyze-commits.outputs.new-version }}"
          new_version=${new_version#v}
          npm version $new_version --no-git-tag-version
          echo "✅ Updated package.json to v$new_version"
      
      - name: Create Git tag
        run: |
          git config user.name "Atomic Swarm Gods Elite Bot"
          git config user.email "bot@atomicswarm.com"
          git add package.json package-lock.json
          git commit -m "chore(release): ${{ needs.analyze-commits.outputs.new-version }} [skip ci]"
          git tag ${{ needs.analyze-commits.outputs.new-version }}
          git push origin ${{ needs.analyze-commits.outputs.new-version }}
          git push origin main
      
      - name: Create GitHub Release
        uses: softprops/action-gh-release@c95fe1489396fe8a9eb87c0abf8aa5b2ef267fda # v2.2.1
        with:
          tag_name: ${{ needs.analyze-commits.outputs.new-version }}
          name: "🚀 Elite Release ${{ needs.analyze-commits.outputs.new-version }}"
          body: |
            ## 🎉 Atomic Swarm Gods Elite Release ${{ needs.analyze-commits.outputs.new-version }}
            
            ### ✨ Features
            - Auto-healing CI/CD pipeline
            - Dynamic test shifting
            - Blockchain audit trail
            - Enterprise security compliance
            
            ### 🔐 Security
            - SHA-pinned GitHub Actions
            - Least-privilege permissions
            - Automated vulnerability scanning
            
            ### 📦 Installation
            ```bash
            npm install @atomic-gods/elite@${{ needs.analyze-commits.outputs.new-version }}
generate_release_notes: true
draft: false
prerelease: false
env:
GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
