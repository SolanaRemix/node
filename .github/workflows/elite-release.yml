name: 🚀 Elite Auto-Release Pipeline
on:
  push: {branches: [main]}
  workflow_dispatch:
    inputs: {version: {required: true, type: string}}
permissions: {contents: write, packages: write, id-token: write, pull-requests: read}
jobs:
  analyze-commits:
    runs-on: ubuntu-latest
    outputs: {release-type: ${{ steps.semantic.outputs.release-type }}, new-version: ${{ steps.version.outputs.new-version }}}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with: {fetch-depth: 0}
      - id: semantic
        run: |
          last_tag=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          commits=$(git log $last_tag..HEAD --format=%s)
          if echo "$commits" | grep -qE '^feat!:|^fix!:|.*BREAKING CHANGE:'; then
            echo "release-type=major" >> $GITHUB_OUTPUT
          elif echo "$commits" | grep -q '^feat:'; then
            echo "release-type=minor" >> $GITHUB_OUTPUT
          elif echo "$commits" | grep -q '^fix:'; then
            echo "release-type=patch" >> $GITHUB_OUTPUT
          else
            echo "release-type=none" >> $GITHUB_OUTPUT
          fi
      - id: version
        run: |
          current=$(git describe --tags --abbrev=0 2>/dev/null || echo "v1.0.0")
          current=${current#v}
          major=$(echo $current | cut -d. -f1)
          minor=$(echo $current | cut -d. -f2)
          patch=$(echo $current | cut -d. -f3)
          case "${{ steps.semantic.outputs.release-type }}" in
            major) new="v$((major+1)).0.0" ;;
            minor) new="v$major.$((minor+1)).0" ;;
            patch) new="v$major.$minor.$((patch+1))" ;;
            *) new="" ;;
          esac
          echo "new-version=$new" >> $GITHUB_OUTPUT
  create-release:
    needs: analyze-commits
    if: needs.analyze-commits.outputs.release-type != 'none'
    runs-on: ubuntu-latest
    permissions: {contents: write, packages: write, id-token: write}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: actions/setup-node@1d0ff469b7ec7b3cb9d8673fde0c81c44821de2a
        with: {node-version: '22'}
      - run: |
          new="${{ needs.analyze-commits.outputs.new-version }}"
          new=${new#v}
          npm version $new --no-git-tag-version || true
      - run: |
          git config user.name "Atomic Swarm Gods Elite Bot"
          git config user.email "bot@atomicswarm.com"
          git add package.json package-lock.json 2>/dev/null || true
          git commit -m "chore(release): ${{ needs.analyze-commits.outputs.new-version }} [skip ci]" || true
          git tag ${{ needs.analyze-commits.outputs.new-version }} || true
          git push origin ${{ needs.analyze-commits.outputs.new-version }} || true
          git push origin main || true
      - name: Create GitHub Release
        uses: softprops/action-gh-release@c95fe14f284dcd3490f620ccd2c5cf2595a7ad1c # v2.2.1
        with:
          tag_name: ${{ needs.analyze-commits.outputs.new-version }}
          name: "🚀 Elite Release ${{ needs.analyze-commits.outputs.new-version }}"
          body: "Auto-generated release"
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}