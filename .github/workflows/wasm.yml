name: 🌐 WASM Validation

on:
  pull_request:
    branches:
      - dev
      - main
  workflow_dispatch:

concurrency:
  group: wasm-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  wasm:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [20.x, 22.x]

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 📦 Setup PNPM
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: 🟢 Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - name: 📥 Install
        run: pnpm install --frozen-lockfile

      - name: 🔎 Validate TypeScript
        run: |
          if [ -f tsconfig.json ]; then
            npx tsc --noEmit
          fi

      - name: 🦀 Validate WASM
        run: pnpm run wasm:check --if-present

      - name: 🧪 Test
        run: pnpm run test --if-present
