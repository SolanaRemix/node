name: "🤖 Elite AI Agent"
 
on:
  workflow_dispatch:
    inputs:
      repair_type:
        description: 'Repair type'
        required: true
        default: 'full'
        type: choice
        options: [full, clean, build, test, ai-optimize]
  schedule:
    - cron: '0 */4 * * *'
  workflow_call:
    inputs:
      repair_type:
        type: string
        default: 'full'
    secrets:
      GITHUB_TOKEN:
        required: false
 
permissions:
  contents: write       # ← was 'read' — blocked all commits
  issues: write
  pull-requests: write
 
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
 
jobs:
  ai-agent:
    runs-on: ubuntu-latest
    timeout-minutes: 20
 
    steps:
      # ── Checkout with write token ────────────────────────────────────────
      - name: "Checkout"
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_REPO }}
          fetch-depth: 0
 
      - name: "Git identity"
        run: |
          git config user.name  "Atomic Gods Elite AI Agent"
          git config user.email "ai-agent@atomic-gods.dev"
 
      - name: "Setup Node 22"
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
 
      - name: "Setup pnpm"
        uses: pnpm/action-setup@v3
        with:
          version: 9
 
      # ── Detect project shape ─────────────────────────────────────────────
      - name: "AI-powered deep analysis"
        id: analyse
        run: |
          echo "AI Agent v1.4.0 — analysing repository..."
 
          # TypeScript?
          TS=$(find . -name "*.ts" -not -path "*/node_modules/*" 2>/dev/null | head -1)
          HAS_TS=$([ -n "$TS" ] && echo true || echo false)
          echo "has_ts=$HAS_TS"       >> $GITHUB_OUTPUT
 
          # Checks
          [ -f "tsconfig.json" ] && echo "tsconfig=true" >> $GITHUB_OUTPUT \
                                 || echo "tsconfig=false" >> $GITHUB_OUTPUT
          node -e "const p=require('./package.json'); process.exit(p.scripts?.build?0:1)" 2>/dev/null \
            && echo "has_build=true"  >> $GITHUB_OUTPUT \
            || echo "has_build=false" >> $GITHUB_OUTPUT
          node -e "const p=require('./package.json'); process.exit(p.scripts?.test?0:1)" 2>/dev/null \
            && echo "has_test=true"   >> $GITHUB_OUTPUT \
            || echo "has_test=false"  >> $GITHUB_OUTPUT
 
          echo "Repository: ${{ github.repository }}"
          echo "Branch: ${{ github.ref_name }}"
          echo "TypeScript: $HAS_TS"
          echo "Has tsconfig: $([ -f tsconfig.json ] && echo yes || echo no)"
          echo "Has build script: $(node -e "const p=require('./package.json');console.log(!!p.scripts?.build)" 2>/dev/null || echo false)"
 
      # ════════════════════════════════════════════════════════════════════════
      # AUTONOMOUS REPAIR — actually creates files and modifies configs
      # Runs on: full, ai-optimize, scheduled (repair_type empty → defaults full)
      # ════════════════════════════════════════════════════════════════════════
      - name: "Autonomous repair execution"
        id: repair
        if: |
          github.event.inputs.repair_type == 'full'       ||
          github.event.inputs.repair_type == 'ai-optimize'||
          github.event.inputs.repair_type == ''           ||
          github.event_name == 'schedule'                 ||
          github.event_name == 'workflow_call'
        run: |
          set -euo pipefail
          FIXES=()
          HAS_TS="${{ steps.analyse.outputs.has_ts }}"
 
          # ── 1. Ensure package.json exists ──────────────────────────────────
          if [ ! -f "package.json" ]; then
            cat > package.json <<PKGJSON
          {
            "name": "$(basename $GITHUB_REPOSITORY)",
            "version": "0.1.0",
            "private": true,
            "scripts": {},
            "devDependencies": {}
          }
          PKGJSON
            FIXES+=("Created package.json")
          fi
 
          # ── 2. Inject missing scripts ───────────────────────────────────────
          node - <<'JS'
          const fs = require('fs');
          const p  = JSON.parse(fs.readFileSync('package.json','utf8'));
          p.scripts = p.scripts || {};
          const hasTS = process.env.HAS_TS === 'true';
          const defs  = hasTS
            ? { build:'tsc', dev:'ts-node src/index.ts', start:'node dist/index.js',
                test:'jest', lint:'eslint . --ext .ts,.tsx', format:'prettier --write .' }
            : { build:'echo "no build"', start:'node src/index.js',
                test:'jest', lint:'eslint .', format:'prettier --write .' };
          let changed = false;
          for (const [k,v] of Object.entries(defs)) {
            if (!p.scripts[k]) { p.scripts[k]=v; changed=true; }
          }
          if (changed) { fs.writeFileSync('package.json',JSON.stringify(p,null,2)+'\n'); }
          JS
          FIXES+=("Patched package.json scripts")
 
          # ── 3. Create tsconfig.json if missing ─────────────────────────────
          if [ "$HAS_TS" = "true" ] && [ ! -f "tsconfig.json" ]; then
            cat > tsconfig.json <<'TSCONFIG'
          {
            "compilerOptions": {
              "target": "ES2020",
              "module": "CommonJS",
              "moduleResolution": "node",
              "lib": ["ES2022", "DOM"],
              "types": ["node"],
              "outDir": "./dist",
              "rootDir": "./src",
              "strict": true,
              "esModuleInterop": true,
              "skipLibCheck": true,
              "forceConsistentCasingInFileNames": true,
              "resolveJsonModule": true,
              "declaration": true,
              "sourceMap": true
            },
            "include": ["src/**/*"],
            "exclude": ["node_modules", "dist", "**/*.test.ts"]
          }
          TSCONFIG
            FIXES+=("Created tsconfig.json")
          elif [ "$HAS_TS" = "true" ] && [ -f "tsconfig.json" ]; then
            node - <<'JS'
          const fs = require('fs');
          const t  = JSON.parse(fs.readFileSync('tsconfig.json','utf8'));
          const co = t.compilerOptions = t.compilerOptions || {};
          const patches = {
            lib:['ES2022','DOM'], types:['node'],
            module:'CommonJS', moduleResolution:'node',
            skipLibCheck:true, esModuleInterop:true
          };
          let changed = false;
          for (const [k,v] of Object.entries(patches)) {
            if (JSON.stringify(co[k]) !== JSON.stringify(v)) { co[k]=v; changed=true; }
          }
          if (changed) { fs.writeFileSync('tsconfig.json',JSON.stringify(t,null,2)+'\n'); }
          JS
            FIXES+=("Patched tsconfig.json")
          fi
 
          # ── 4. .gitignore ──────────────────────────────────────────────────
          if [ ! -f ".gitignore" ]; then
            printf 'node_modules/\ndist/\n.env\n.env.local\n*.log\ncoverage/\n' > .gitignore
            FIXES+=("Created .gitignore")
          fi
 
          # ── 5. Clean install (full-rebuild mode) ───────────────────────────
          if [ "${{ github.event.inputs.repair_type }}" = "clean" ]; then
            rm -rf node_modules pnpm-lock.yaml package-lock.json yarn.lock
            FIXES+=("Cleaned lockfiles")
          fi
 
          # ── 6. Install deps ────────────────────────────────────────────────
          if [ -f "pnpm-lock.yaml" ] || [ "${{ github.event.inputs.repair_type }}" = "clean" ]; then
            pnpm install --no-frozen-lockfile 2>&1 | tail -5 || true
          else
            npm install 2>&1 | tail -5 || true
          fi
          FIXES+=("Ran install")
 
          # ── 7. Install missing TS devDeps ──────────────────────────────────
          if [ "$HAS_TS" = "true" ]; then
            node - <<'JS'
          const p  = JSON.parse(require('fs').readFileSync('package.json','utf8'));
          const dd = {...(p.devDependencies||{}), ...(p.dependencies||{})};
          const missing = ['typescript','@types/node','ts-node'].filter(d=>!dd[d]);
          if (missing.length) {
            require('child_process').execSync('npm install --save-dev '+missing.join(' '),{stdio:'inherit'});
          }
          JS
            FIXES+=("Ensured TypeScript devDeps")
          fi
 
          # ── 8. Remove stale console redeclarations ─────────────────────────
          if [ "$HAS_TS" = "true" ]; then
            find src -name "*.ts" 2>/dev/null | while read f; do
              if grep -q 'declare const console: Console' "$f" 2>/dev/null; then
                sed -i '/\/\/\/ <reference types="node" \/>/d' "$f"
                sed -i '/declare const console: Console;/d' "$f"
              fi
            done
            FIXES+=("Cleaned stale console declarations")
          fi
 
          # ── 9. Prettier ────────────────────────────────────────────────────
          npx --yes prettier --write . --ignore-unknown 2>/dev/null && FIXES+=("Applied Prettier") || true
 
          # ── 10. ESLint fix ─────────────────────────────────────────────────
          EXT=$([ "$HAS_TS" = "true" ] && echo ".ts,.tsx,.js,.jsx" || echo ".js,.jsx")
          npx eslint --fix --ext "$EXT" . 2>/dev/null || true
          FIXES+=("Ran ESLint --fix")
 
          # ── 11. TypeScript check ───────────────────────────────────────────
          if [ "$HAS_TS" = "true" ] && [ -f "tsconfig.json" ]; then
            TS_ERRS=$(npx tsc --noEmit 2>&1 | grep -c "error TS" || echo 0)
            [ "$TS_ERRS" = "0" ] && FIXES+=("TypeScript: no errors") \
                                 || FIXES+=("TypeScript: $TS_ERRS error(s) remain")
          fi
 
          # ── 12. Build ──────────────────────────────────────────────────────
          node -e "const p=require('./package.json');process.exit(p.scripts?.build?0:1)" 2>/dev/null \
            && npm run build 2>&1 | tail -5 && FIXES+=("Build succeeded") || true
 
          # ── 13. Tests ──────────────────────────────────────────────────────
          if [ "${{ github.event.inputs.repair_type }}" = "test" ] || [ "${{ github.event.inputs.repair_type }}" = "full" ]; then
            npm test 2>&1 | tail -10 || true
          fi
 
          # ── 14. Commit & push ──────────────────────────────────────────────
          printf '%s\n' "${FIXES[@]}" > /tmp/fixes.txt
          git add -A
          if git diff --cached --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            git commit -m "🤖 Elite AI Agent: autonomous repair
 
          $(cat /tmp/fixes.txt)"
            git push origin HEAD:"${{ github.ref_name }}"
            echo "changed=true" >> $GITHUB_OUTPUT
          fi
 
      # ── Build-only mode ───────────────────────────────────────────────────
      - name: "Build only"
        if: github.event.inputs.repair_type == 'build'
        run: |
          pnpm install --no-frozen-lockfile || npm install
          npm run build
 
      # ── Test-only mode ────────────────────────────────────────────────────
      - name: "Test only"
        if: github.event.inputs.repair_type == 'test'
        run: |
          pnpm install --no-frozen-lockfile || npm install
          npm test
 
      # ── Step summary ──────────────────────────────────────────────────────
      - name: "Generate AI report"
        if: always()
        run: |
          FIXES=$(cat /tmp/fixes.txt 2>/dev/null || echo "No fixes logged")
          cat >> $GITHUB_STEP_SUMMARY <<SUMMARY
          ## 🤖 Elite AI Agent Report
 
          | Field | Value |
          |-------|-------|
          | Repository | ${{ github.repository }} |
          | Branch | ${{ github.ref_name }} |
          | Mode | ${{ github.event.inputs.repair_type || 'full (scheduled)' }} |
          | Node | $(node --version) |
          | Changes committed | ${{ steps.repair.outputs.changed || 'false' }} |
 
          **Fixes applied:**
          \`\`\`
          $FIXES
          \`\`\`
          SUMMARY
 
      # ── Create issue on failure ───────────────────────────────────────────
      - name: "Create issue on failure"
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              title: `🤖 Elite AI Agent — repair failed (${new Date().toISOString().slice(0,10)})`,
              body: `## AI Agent repair failed\n\nRun: ${context.runId}\nBranch: ${context.ref}\nTime: ${new Date().toUTCString()}\n\nComment \`@repair\` on any PR to trigger manual repair.`,
              labels: ['bug','auto-repair']
            });
