name: "🤖 Elite AI Agent"

on:
  workflow_dispatch:
    inputs:
      repair_type:
        description: 'Repair type'
        required: true
        default: 'full'
        type: choice
        options: [full, clean, build, test]
  schedule:
    - cron: '0 */4 * * *'

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  ai-agent:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@v4
        with:
          node-version: '22.x'
      - run: |
          npm install
          npm run build
          npm test
          git add .
          git diff --cached --quiet || {
            git config user.name "Elite AI Agent"
            git config user.email "ai-agent@atomic-gods.dev"
            git commit -m "🤖 Elite AI Agent: Autonomous repair"
            git push
          }
