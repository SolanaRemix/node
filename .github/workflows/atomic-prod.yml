name: 🚀 Atomic Node Repair (Prod)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

concurrency:
  group: atomic-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  atomic-repair:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      matrix:
        node: [20.x, 22.x]
      fail-fast: false

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🚀 Setup Atomic Environment
        uses: ./.github/actions/setup-node-pnpm
        with:
          node-version: ${{ matrix.node }}
          enable-wasm: 'false'

      - name: 🏗 Build
        run: pnpm run build

      - name: ✅ Test
        run: pnpm run test

      - name: 📖 Refresh Docs
        run: |
          mkdir -p docs
          echo "# 📚 Documentation" > docs/README.md
          echo "Generated: $(date)" >> docs/README.md
          git add docs/ || true

      - name: 📝 Update Changelog
        run: |
          echo "## [$(date +%Y-%m-%d)] Atomic Repair" >> CHANGELOG.md
          echo "- Node ${{ matrix.node }} verified" >> CHANGELOG.md
          git add CHANGELOG.md || true

      - name: 🔒 Lockfile Integrity
        run: pnpm install --frozen-lockfile --check-files

      - name: 🎯 Final Verification
        run: |
          echo "✅ Atomic repair complete for Node ${{ matrix.node }}"
          pnpm run typecheck