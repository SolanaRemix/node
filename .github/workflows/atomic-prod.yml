name: "🚀 Atomic Node Repair (Prod)"

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  atomic-repair:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [20, 22]
      fail-fast: false

    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}.x
          
      - uses: pnpm/action-setup@v3
        with:
          version: 8
          
      - name: Install dependencies
        run: |
          if [ -f "pnpm-lock.yaml" ]; then
            pnpm install --frozen-lockfile
          else
            pnpm install --no-frozen-lockfile
            pnpm install --frozen-lockfile  # Regenerate lockfile
          fi
          
      - name: Type check
        run: |
          if npm run 2>/dev/null | grep -q "typecheck"; then
            pnpm run typecheck
          elif [ -f "tsconfig.json" ]; then
            npx tsc --noEmit --strict
          fi
          
      - name: Build
        run: pnpm run build || echo "No build script"
        
      - name: Test
        run: pnpm run test || echo "No test script"
        
      - name: Success
        if: success()
        run: echo "✅ Atomic repair passed for Node ${{ matrix.node }}"
