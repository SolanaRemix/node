name: "🚀 Atomic Node Repair (Prod)"

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
    inputs:
      repair_type:
        description: 'Repair type'
        required: false
        default: 'full'
        type: string
  workflow_call:
    inputs:
      repair_type:
        description: 'Repair type (full, clean, build, test)'
        required: false
        default: 'full'
        type: string
    secrets:
      NPM_TOKEN:
        required: false
      REPO_TOKEN:
        required: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  atomic-repair:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [20, 22]
      fail-fast: false

    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}.x
          
      - uses: pnpm/action-setup@v3
        with:
          version: 8
          
      - name: Install dependencies
        run: |
          if [ -f "pnpm-lock.yaml" ]; then
            pnpm install --frozen-lockfile
          else
            pnpm install --no-frozen-lockfile
          fi
          
      - name: Run repair based on type
        run: |
          case "${{ inputs.repair_type }}" in
            clean)
              echo "🧹 Cleaning entropy..."
              rm -rf node_modules pnpm-lock.yaml package-lock.json
              ;;
            build)
              echo "🔨 Building project..."
              npm run build || echo "No build script"
              ;;
            test)
              echo "✅ Running tests..."
              npm test || echo "No test script"
              ;;
            full|*)
              echo "🚀 Running full repair..."
              rm -rf node_modules pnpm-lock.yaml package-lock.json
              npm install
              npm run build || echo "No build script"
              npm test || echo "No test script"
              ;;
          esac
          
      - name: Type check
        run: |
          if [ -f "tsconfig.json" ]; then
            npx tsc --noEmit --strict || true
          fi
          
      - name: Success
        if: success()
        run: echo "✅ Atomic repair passed for Node ${{ matrix.node }}"
