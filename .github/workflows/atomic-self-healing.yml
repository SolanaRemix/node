name: "⚛️ Atomic Self-Healing - Dynamic Auto-Repair"
on:
  push: {branches: [main, develop, master]}
  schedule: [{cron: '*/30 * * * *'}]
  workflow_dispatch:
    inputs:
      force_heal: {required: false, default: false, type: boolean}
      security_level: {required: false, default: 'maximum', type: choice, options: [minimal, standard, maximum]}
permissions: {contents: write, actions: read, checks: read}
env: {ELITE_VERSION: "1.7.0", NODE_OPTIONS: "--max-old-space-size=4096"}
concurrency: {group: self-heal-${{ github.ref }}, cancel-in-progress: true}
jobs:
  detect-failures:
    runs-on: ubuntu-latest
    strategy:
      matrix: {node: [20, 22]}
      fail-fast: false
    outputs:
      node20_failed: ${{ steps.test20.outcome == 'failure' }}
      node22_failed: ${{ steps.test22.outcome == 'failure' }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: actions/setup-node@1d0ff469b7ec7b3cb9d8673fde0c81c44821de2a
        with: {node-version: ${{ matrix.node }}, cache: npm}
      - run: npm ci || npm install
      - id: test${{ matrix.node }}
        continue-on-error: true
        run: npm test
  choose-strategy:
    runs-on: ubuntu-latest
    needs: detect-failures
    if: github.event.inputs.force_heal == 'true' || needs.detect-failures.outputs.node20_failed == 'true' || needs.detect-failures.outputs.node22_failed == 'true'
    outputs: {strategy: ${{ steps.switch.outputs.strategy }}, patches: ${{ steps.switch.outputs.patches }}}
    steps:
      - id: switch
        run: |
          HARDENING="${{ github.event.inputs.security_level || 'maximum' }}"
          STRATEGY="adaptive-hardening"
          PATCHES="add_helmet,rate_limiting"
          if [ "$HARDENING" = "maximum" ]; then
            PATCHES="${PATCHES},csp_headers,csrf_protection"
          fi
          echo "strategy=$STRATEGY" >> $GITHUB_OUTPUT
          echo "patches=$PATCHES" >> $GITHUB_OUTPUT
  parallel-heal:
    runs-on: ubuntu-latest
    needs: choose-strategy
    strategy:
      matrix: {approach: [inline, patch, regenerate]}
      fail-fast: false
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: actions/setup-node@1d0ff469b7ec7b3cb9d8673fde0c81c44821de2a
        with: {node-version: '22'}
      - run: |
          STRATEGY="${{ needs.choose-strategy.outputs.strategy }}"
          PATCHES="${{ needs.choose-strategy.outputs.patches }}"
          mkdir -p .healing/${{ matrix.approach }}
          echo '{"strategy":"'"$STRATEGY"'","patches":"'"$PATCHES"'"}' > .healing/${{ matrix.approach }}/applied.json
      - run: npm ci && npm test  # validate healing
  commit-fixes:
    runs-on: ubuntu-latest
    needs: parallel-heal
    if: always()
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with: {token: ${{ secrets.GITHUB_TOKEN }}}
      - run: |
          git config user.name "Elite Self-Healing Bot"
          git config user.email "self-healing@atomic-swarm-gods.dev"
          git add .healing/ 2>/dev/null || true
          git diff --staged --quiet || git commit -m "⚛️ Atomic Self-Healing: applied fixes"
          git push origin HEAD:${{ github.head_ref || github.ref_name }} || true